<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alipen.cl — Arquitectura & Taller IA</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-elevated: #12121a;
            --bg-card: #16161f;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8e8ed;
            --text-muted: #8b8b9a;
            --accent: #7c5cff;
            --accent-glow: rgba(124, 92, 255, 0.35);
            --accent-2: #00d4aa;
            --gradient: linear-gradient(135deg, #7c5cff 0%, #00d4aa 100%);
            --radius: 12px;
            --radius-lg: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }
        header { position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 100; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav a { color: var(--text-muted); text-decoration: none; margin-left: 2rem; transition: 0.3s; font-size: 0.95rem; }
        nav a:hover, nav a.active { color: var(--text); }
        .hero { padding: 8rem 2rem 4rem; text-align: center; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -1px; }
        .hero p { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        section { padding: 5rem 0; border-top: 1px solid var(--border); }
        h2 { font-size: 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
        
        /* Carrusel */
        .carousel-container { position: relative; border-radius: var(--radius-lg); overflow: hidden; height: 450px; border: 1px solid var(--border); margin-bottom: 1rem; }
        .carousel-slide { width: 100%; height: 100%; display: none; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000; transition: 0.5s ease-in-out; }
        .carousel-slide.active { display: block; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; }
        .carousel-btn:hover { background: var(--accent); }
        .carousel-prev { left: 1.5rem; } .carousel-next { right: 1.5rem; }
        .carousel-footer { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem; }

        /* Portafolio Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.3s, border-color 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-img-box { width: 100%; height: 220px; background: #050508; overflow: hidden; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; padding: 0.5rem; }
        .card-info { padding: 1.2rem; }
        .card-tag { font-size: 0.75rem; text-transform: uppercase; color: var(--accent-2); font-weight: 700; margin-bottom: 0.4rem; letter-spacing: 1px; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
        .card-desc { font-size: 0.85rem; color: var(--text-muted); }

        /* Taller IA */
        .ia-box { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; max-width: 700px; margin: 0 auto; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        select, textarea { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); color: #fff; padding: 0.8rem; font-size: 0.95rem; outline: none; transition: border-color 0.3s; }
        select:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: 100px; resize: none; }
        .btn-mix { width: 100%; background: var(--gradient); border: none; color: #fff; padding: 1rem; font-size: 1rem; font-weight: 700; border-radius: var(--radius); cursor: pointer; transition: opacity 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-mix:hover { opacity: 0.9; }
        .ia-result { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 2rem; text-align: center; display: none; }
        .ia-result img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .spinner { display: none; margin: 1.5rem auto; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent-2); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Contacto & Footer */
        .contact-section { text-align: center; max-width: 500px; margin: 0 auto; }
        .btn-email { display: inline-flex; background: var(--bg-card); border: 1px solid var(--border); color: #fff; padding: 1rem 2rem; border-radius: var(--radius); text-decoration: none; font-weight: 600; margin-bottom: 1rem; transition: 0.3s; }
        .btn-email:hover { border-color: var(--accent); background: #1c1c27; }
        footer { padding: 3rem 2rem; text-align: center; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; }

        /* Lightbox */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,8,0.95); z-index: 200; display: none; align-items: center; justify-content: center; padding: 2rem; }
        .lightbox.active { display: flex; }
        .lightbox-content { position: relative; max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; }
        .lightbox-img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .lightbox-caption { color: #fff; margin-top: 1rem; font-size: 1.1rem; text-align: center; font-weight: 500; }
        .lightbox-close { position: absolute; top: -3rem; right: 0; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none; }
    </style>
</head>
